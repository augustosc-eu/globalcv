name: Mirror to public repo

on:
  push:
    branches: [main]

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Push to public mirror
        env:
          TOKEN: ${{ secrets.PUBLIC_REPO_TOKEN }}
        run: |
          if [ -z "$TOKEN" ]; then
            echo "ERROR: PUBLIC_REPO_TOKEN secret is not set"
            exit 1
          fi
          git remote add public https://x-access-token:${TOKEN}@github.com/augustosc-eu/globalcv.git
          git push public main --force
          echo "Mirror push succeeded"
